<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal SMC & Backtest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>⚡ SMC Trading Journal</h1>
        <!-- SELETTORE TAB: LIVE vs BACKTEST -->
        <nav class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('live')">🔴 Trading Live</button>
            <button class="tab-btn" onclick="switchTab('backtest')">🧪 Modulo Backtest</button>
        </nav>
    </header>

    <main class="container">
        
        <!-- 📈 DASHBOARD STATISTICHE -->
        <section class="dashboard">
            <div class="card">
                <h3>Win Rate</h3>
                <p id="win-rate">0%</p>
            </div>
            <div class="card">
                <h3>Profit Factor</h3>
                <p id="profit-factor">0.00</p>
            </div>
            <div class="card">
                <h3>R:R Medio</h3>
                <p id="avg-rr">1:0.00</p>
            </div>
            <div class="card">
                <h3>P&L / R Totale</h3>
                <p id="total-pl">€0.00</p>
            </div>
        </section>

        <!-- 🧮 CALCOLATORE DI LOTTAGGIO INTEGRATO -->
        <section class="form-container calculator-box">
            <h2>🧮 Calcolatore Lottaggio Rapido</h2>
            <div class="form-group-row">
                <div>
                    <label for="calc-balance">Capitale Conto (€/$)</label>
                    <input type="number" id="calc-balance" placeholder="es. 10000" value="10000">
                </div>
                <div>
                    <label for="calc-risk-pct">Rischio %</label>
                    <input type="number" id="calc-risk-pct" placeholder="es. 1" value="1" step="0.1">
                </div>
                <div>
                    <label for="calc-sl-pips">Stop Loss (Pips/Punti)</label>
                    <input type="number" id="calc-sl-pips" placeholder="es. 15">
                </div>
                <div>
                    <label>Lotti Consigliati</label>
                    <div id="calc-result" class="calc-output">0.00 Lotti</div>
                </div>
            </div>
        </section>

        <!-- 📝 FORM INSERIMENTO TRADE -->
        <section class="form-container">
            <h2 id="form-title">Nuova Operazione (Live)</h2>
            <form id="trade-form">
                
                <div class="form-group-row">
                    <div>
                        <label for="trade-date">Data e Ora</label>
                        <input type="datetime-local" id="trade-date" required>
                    </div>
                    <div>
                        <label for="asset">Asset</label>
                        <select id="asset" required>
                            <option value="EURUSD">EURUSD</option>
                            <option value="GBPUSD">GBPUSD</option>
                            <option value="AUDJPY">AUDJPY</option>
                            <option value="DXY">DXY</option>
                            <option value="OTHER">Altro</option>
                        </select>
                    </div>
                    <div>
                        <label for="direction">Direzione</label>
                        <select id="direction" required>
                            <option value="BUY">BUY (Long)</option>
                            <option value="SELL">SELL (Short)</option>
                        </select>
                    </div>
                    <div>
                        <label for="session">Sessione</label>
                        <select id="session" required>
                            <option value="Asia">Asia</option>
                            <option value="Londra">Londra</option>
                            <option value="New York">New York</option>
                            <option value="Overlap">Overlap</option>
                        </select>
                    </div>
                </div>

                <div class="form-group-row">
                    <div>
                        <label for="entry">Prezzo Ingresso</label>
                        <input type="number" step="any" id="entry" placeholder="es. 1.0850" required>
                    </div>
                    <div>
                        <label for="sl">Stop Loss (SL)</label>
                        <input type="number" step="any" id="sl" placeholder="es. 1.0830" required>
                    </div>
                    <div>
                        <label for="tp">Take Profit (TP)</label>
                        <input type="number" step="any" id="tp" placeholder="es. 1.0910" required>
                    </div>
                    <div>
                        <label for="rr-auto">R:R Calcolato</label>
                        <input type="text" id="rr-auto" placeholder="1:0.00" readonly class="readonly-input">
                    </div>
                </div>

                <div class="form-group-row">
                    <div>
                        <label for="result">Esito</label>
                        <select id="result" required>
                            <option value="WIN">WIN</option>
                            <option value="LOSS">LOSS</option>
                            <option value="BE">BREAKEVEN (BE)</option>
                        </select>
                    </div>
                    <div>
                        <label for="pnl">Profit / Loss (€/$)</label>
                        <input type="number" step="any" id="pnl" placeholder="es. 150 o -50" required>
                    </div>
                </div>

                <!-- 🧠 Confluenze SMC -->
                <hr>
                <h3>Confluenze SMC</h3>
                <div class="form-group-row">
                    <div>
                        <label for="poi">POI</label>
                        <select id="poi">
                            <option value="Order Block">Order Block (OB)</option>
                            <option value="Fair Value Gap">Fair Value Gap (FVG)</option>
                            <option value="Liquidity Sweep">Liquidity Sweep</option>
                            <option value="Breaker Block">Breaker Block</option>
                        </select>
                    </div>
                    <div>
                        <label for="trigger">Trigger</label>
                        <select id="trigger">
                            <option value="ChoCh">ChoCh</option>
                            <option value="MSS">MSS</option>
                            <option value="Rejection Wick">Rejection Wick</option>
                            <option value="SMT">Divergenza SMT</option>
                        </select>
                    </div>
                    <div>
                        <label for="liquidity">Liquidità</label>
                        <select id="liquidity">
                            <option value="Buy-side">Buy-side</option>
                            <option value="Sell-side">Sell-side</option>
                            <option value="Entrambe">Entrambe</option>
                        </select>
                    </div>
                </div>

                <!-- 🖼️ UPLOAD IMMAGINI DIRETTO -->
                <hr>
                <h3>Visual & Note</h3>
                <div class="form-group-row">
                    <div>
                        <label for="file-before">Foto Prima dell'ingresso</label>
                        <input type="file" id="file-before" accept="image/*">
                    </div>
                    <div>
                        <label for="file-after">Foto Dopo la chiusura</label>
                        <input type="file" id="file-after" accept="image/*">
                    </div>
                </div>
                <div>
                    <label for="notes">Note & Mindset</label>
                    <textarea id="notes" rows="2" placeholder="Come ti sentivi? Note sul trade..."></textarea>
                </div>

                <button type="submit" id="save-btn">Salva Operazione</button>
            </form>
        </section>

        <!-- 📊 TABELLA OPERAZIONI -->
        <section class="table-container">
            <h2 id="table-title">Storico Operazioni Live</h2>
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Asset</th>
                        <th>Tipo</th>
                        <th>POI</th>
                        <th>R:R</th>
                        <th>P&L</th>
                        <th>Esito</th>
                        <th>Foto</th>
                        <th>Azione</th>
                    </tr>
                </thead>
                <tbody id="trade-list">
                    <!-- Trade dinamici -->
                </tbody>
            </table>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>

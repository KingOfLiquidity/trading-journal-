<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal Pro</title>
    <!-- SheetJS per l'esportazione in Excel (.xlsx) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- Supabase SDK per la persistenza Cloud -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --win-color: #22c55e;
            --loss-color: #ef4444;
            --be-color: #eab308;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            color: var(--accent);
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        input, select, textarea {
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 6px;
            font-size: 0.95rem;
        }

        input[type="file"] {
            padding: 7px;
            font-size: 0.85rem;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .actions-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        button {
            padding: 10px 18px;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .btn-primary { background-color: var(--accent); color: #0f172a; }
        .btn-excel { background-color: #107c41; color: white; }
        .btn-secondary { background-color: var(--border); color: var(--text-main); }
        .btn-danger { background-color: var(--loss-color); color: white; }

        /* Table Styling */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: rgba(255, 255, 255, 0.03);
            color: var(--text-muted);
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .badge-win { background-color: rgba(34, 197, 94, 0.2); color: var(--win-color); }
        .badge-loss { background-color: rgba(239, 68, 68, 0.2); color: var(--loss-color); }
        .badge-be { background-color: rgba(234, 179, 8, 0.2); color: var(--be-color); }

        .img-preview {
            max-width: 50px;
            max-height: 40px;
            border-radius: 4px;
            cursor: pointer;
            object-fit: cover;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📊 Trading Journal</h1>
        <div class="actions-bar" style="margin-top:0;">
            <button class="btn-excel" onclick="exportToExcel()">📥 Esporta Excel (.xlsx)</button>
            <button class="btn-secondary" onclick="exportJSONBackup()">💾 Backup JSON</button>
            <input type="file" id="importFile" style="display:none" onchange="importJSONBackup(event)">
            <button class="btn-secondary" onclick="document.getElementById('importFile').click()">📂 Carica Backup</button>
        </div>
    </header>

    <!-- FORM INSERIMENTO TRADE -->
    <div class="card">
        <h2>Nuova Operazione</h2>
        <form id="tradeForm">
            <div class="form-grid">
                <div class="form-group">
                    <label for="date">Data</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label for="asset">Asset / Coppia</label>
                    <input type="text" id="asset" placeholder="es. EUR/USD, AUD/JPY, Oro" required>
                </div>
                <div class="form-group">
                    <label for="strategy">Nome Strategia</label>
                    <input type="text" id="strategy" placeholder="es. Scalp Oro, Swing AUD/CAD" required>
                </div>
                <div class="form-group">
                    <label for="direction">Direzione</label>
                    <select id="direction">
                        <option value="LONG">LONG 📈</option>
                        <option value="SHORT">SHORT 📉</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="result">Esito</label>
                    <select id="result">
                        <option value="WIN">WIN 🟢</option>
                        <option value="LOSS">LOSS 🔴</option>
                        <option value="BE">BE 🟡</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="rr">R : R (Rischio/Rendimento)</label>
                    <select id="rr" required>
                        <option value="1:0.5">1 : 0.5</option>
                        <option value="1:1">1 : 1</option>
                        <option value="1:1.5">1 : 1.5</option>
                        <option value="1:2" selected>1 : 2</option>
                        <option value="1:2.5">1 : 2.5</option>
                        <option value="1:3">1 : 3</option>
                        <option value="1:3.5">1 : 3.5</option>
                        <option value="1:4">1 : 4</option>
                        <option value="1:5">1 : 5</option>
                        <option value="1:6">1 : 6</option>
                        <option value="1:7">1 : 7</option>
                        <option value="1:8">1 : 8</option>
                        <option value="1:10">1 : 10+</option>
                    </select>
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label for="imageFile">Carica Screenshot (dalla Galleria / File)</label>
                    <input type="file" id="imageFile" accept="image/*">
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label for="notes">Note Brevi / Confluenze</label>
                    <textarea id="notes" rows="2" placeholder="Note veloci sul trade..."></textarea>
                </div>
            </div>
            <div class="actions-bar">
                <button type="submit" class="btn-primary">➕ Salva Trade</button>
            </div>
        </form>
    </div>

    <!-- TABELLA STORICO -->
    <div class="card">
        <h2>Storico Operazioni</h2>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Asset</th>
                        <th>Strategia</th>
                        <th>Direzione</th>
                        <th>Esito</th>
                        <th>R:R</th>
                        <th>Foto</th>
                        <th>Note</th>
                        <th>Azione</th>
                    </tr>
                </thead>
                <tbody id="tradeTableBody">
                    <!-- I dati inseriti compaiono qui -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- SUPABASE CONFIG (Facoltativo per Cloud Sync) ---
    const SUPABASE_URL = "https://TUO-PROGETTO.supabase.co"; 
    const SUPABASE_KEY = "LA-TUA-ANON-KEY";
    let supabase = null;
    if (SUPABASE_URL !== "https://TUO-PROGETTO.supabase.co") {
        supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    }

    // Inizializzazione Data
    document.getElementById('date').valueAsDate = new Date();
    let trades = JSON.parse(localStorage.getItem('trading_journal_trades')) || [];

    // Helper per convertire l'immagine in Base64
    function convertFileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    // Rendering Tabella
    function renderTrades() {
        const tbody = document.getElementById('tradeTableBody');
        tbody.innerHTML = '';

        trades.forEach((trade, index) => {
            const tr = document.createElement('tr');
            
            let badgeClass = 'badge-win';
            if(trade.result === 'LOSS') badgeClass = 'badge-loss';
            if(trade.result === 'BE') badgeClass = 'badge-be';

            const imgContent = trade.image 
                ? `<a href="${trade.image}" target="_blank"><img src="${trade.image}" class="img-preview" alt="Chart"></a>`
                : '-';

            tr.innerHTML = `
                <td>${trade.date}</td>
                <td><strong>${trade.asset}</strong></td>
                <td>${trade.strategy}</td>
                <td>${trade.direction}</td>
                <td><span class="badge ${badgeClass}">${trade.result}</span></td>
                <td>${trade.rr}</td>
                <td>${imgContent}</td>
                <td>${trade.notes || '-'}</td>
                <td><button class="btn-danger" style="padding:4px 8px; font-size:0.75rem;" onclick="deleteTrade(${index})">🗑️</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Aggiungi Trade
    document.getElementById('tradeForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        let imageData = "";
        const fileInput = document.getElementById('imageFile');
        if (fileInput.files && fileInput.files[0]) {
            try {
                imageData = await convertFileToBase64(fileInput.files[0]);
            } catch (err) {
                console.error("Errore nel caricamento immagine", err);
            }
        }

        const newTrade = {
            date: document.getElementById('date').value,
            asset: document.getElementById('asset').value.toUpperCase(),
            strategy: document.getElementById('strategy').value,
            direction: document.getElementById('direction').value,
            result: document.getElementById('result').value,
            rr: document.getElementById('rr').value,
            image: imageData,
            notes: document.getElementById('notes').value
        };

        trades.unshift(newTrade);
        saveLocal();

        if (supabase) {
            await supabase.from('trades').insert([newTrade]);
        }

        renderTrades();
        this.reset();
        document.getElementById('date').valueAsDate = new Date();
    });

    // Salva in LocalStorage
    function saveLocal() {
        localStorage.setItem('trading_journal_trades', JSON.stringify(trades));
    }

    // Elimina Trade
    function deleteTrade(index) {
        if(confirm('Vuoi davvero eliminare questa operazione?')) {
            trades.splice(index, 1);
            saveLocal();
            renderTrades();
        }
    }

    // --- ESPORTAZIONE IN EXCEL (.XLSX) ---
    function exportToExcel() {
        if (trades.length === 0) {
            alert("Non ci sono operazioni da esportare!");
            return;
        }

        const excelData = trades.map(t => ({
            "Data": t.date,
            "Asset": t.asset,
            "Nome Strategia": t.strategy,
            "Direzione": t.direction,
            "Esito": t.result,
            "R:R": t.rr,
            "Note": t.notes
        }));

        const worksheet = XLSX.utils.json_to_sheet(excelData);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Storico Trade");

        XLSX.writeFile(workbook, `Trading_Journal_Backup_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    // --- BACKUP & RIPRISTINO JSON ---
    function exportJSONBackup() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(trades, null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", `trading_journal_backup.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    }

    function importJSONBackup(event) {
        const fileReader = new FileReader();
        fileReader.onload = function(e) {
            try {
                const importedTrades = JSON.parse(e.target.result);
                if (Array.isArray(importedTrades)) {
                    trades = importedTrades;
                    saveLocal();
                    renderTrades();
                    alert("Backup caricato con successo!");
                } else {
                    alert("Formato file non valido!");
                }
            } catch (err) {
                alert("Errore nel caricamento del file!");
            }
        };
        fileReader.readAsText(event.target.files[0]);
    }

    // Primo avvio
    renderTrades();
</script>

</body>
</html>

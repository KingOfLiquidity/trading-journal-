<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal SMC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>⚡ SMC Trading Journal</h1>
    </header>

    <main class="container">
        
        <!-- 📈 DASHBOARD STATISTICHE -->
        <section class="dashboard">
            <div class="card">
                <h3>Win Rate</h3>
                <p id="win-rate">0%</p>
            </div>
            <div class="card">
                <h3>Profit Factor</h3>
                <p id="profit-factor">0.00</p>
            </div>
            <div class="card">
                <h3>R:R Medio</h3>
                <p id="avg-rr">0.00</p>
            </div>
            <div class="card">
                <h3>Profit/Loss Totale</h3>
                <p id="total-pl">€0.00</p>
            </div>
        </section>

        <!-- 📝 FORM INSERIMENTO TRADE -->
        <section class="form-container">
            <h2>Nuova Operazione</h2>
            <form id="trade-form">
                
                <!-- 1. Dati Essenziali -->
                <div class="form-group-row">
                    <div>
                        <label for="trade-date">Data e Ora</label>
                        <input type="datetime-local" id="trade-date" required>
                    </div>
                    <div>
                        <label for="asset">Coppia / Asset</label>
                        <select id="asset" required>
                            <option value="EURUSD">EURUSD</option>
                            <option value="GBPUSD">GBPUSD</option>
                            <option value="AUDJPY">AUDJPY</option>
                            <option value="DXY">DXY</option>
                            <option value="OTHER">Altro</option>
                        </select>
                    </div>
                    <div>
                        <label for="direction">Direzione</label>
                        <select id="direction" required>
                            <option value="BUY">BUY (Long)</option>
                            <option value="SELL">SELL (Short)</option>
                        </select>
                    </div>
                    <div>
                        <label for="session">Sessione</label>
                        <select id="session" required>
                            <option value="Asia">Asia</option>
                            <option value="Londra">Londra</option>
                            <option value="New York">New York</option>
                            <option value="Overlap">Overlap</option>
                        </select>
                    </div>
                </div>

                <div class="form-group-row">
                    <div>
                        <label for="entry">Prezzo Ingresso</label>
                        <input type="number" step="any" id="entry" placeholder="es. 1.0850" required>
                    </div>
                    <div>
                        <label for="sl">Stop Loss (SL)</label>
                        <input type="number" step="any" id="sl" placeholder="es. 1.0830" required>
                    </div>
                    <div>
                        <label for="tp">Take Profit (TP)</label>
                        <input type="number" step="any" id="tp" placeholder="es. 1.0910" required>
                    </div>
                    <div>
                        <label for="risk">Rischio % / Lotti</label>
                        <input type="number" step="any" id="risk" placeholder="es. 1%" required>
                    </div>
                </div>

                <div class="form-group-row">
                    <div>
                        <label for="result">Risultato</label>
                        <select id="result" required>
                            <option value="WIN">WIN</option>
                            <option value="LOSS">LOSS</option>
                            <option value="BE">BREAKEVEN (BE)</option>
                        </select>
                    </div>
                    <div>
                        <label for="rr">R:R Effettivo</label>
                        <input type="number" step="any" id="rr" placeholder="es. 3.0" required>
                    </div>
                    <div>
                        <label for="pnl">Profit / Loss (€/$)</label>
                        <input type="number" step="any" id="pnl" placeholder="es. 150 o -50" required>
                    </div>
                </div>

                <!-- 🧠 2. Modello Operativo SMC -->
                <hr>
                <h3>Confluenze SMC</h3>
                <div class="form-group-row">
                    <div>
                        <label for="poi">Punto di Interesse (POI)</label>
                        <select id="poi">
                            <option value="Order Block">Order Block (OB)</option>
                            <option value="Fair Value Gap">Fair Value Gap (FVG)</option>
                            <option value="Liquidity Sweep">Liquidity Sweep</option>
                            <option value="Breaker Block">Breaker Block</option>
                        </select>
                    </div>
                    <div>
                        <label for="trigger">Conferma / Trigger</label>
                        <select id="trigger">
                            <option value="ChoCh">Change of Character (ChoCh)</option>
                            <option value="MSS">Market Structure Shift (MSS)</option>
                            <option value="Rejection Wick">Rejection Wick</option>
                            <option value="SMT">Divergenza SMT</option>
                        </select>
                    </div>
                    <div>
                        <label for="liquidity">Liquidità Presa</label>
                        <select id="liquidity">
                            <option value="Buy-side">Buy-side Liquidity</option>
                            <option value="Sell-side">Sell-side Liquidity</option>
                            <option value="Entrambe">Entrambe</option>
                        </select>
                    </div>
                    <div>
                        <label for="trend">Trend di Fondo</label>
                        <select id="trend">
                            <option value="Pro-Trend">Pro-Trend (Con la struttura)</option>
                            <option value="Counter-Trend">Counter-Trend (Contro-tendenz)</option>
                        </select>
                    </div>
                </div>

                <!-- 📸 3. Screenshot & Note -->
                <hr>
                <h3>Visual & Mindset</h3>
                <div class="form-group-row">
                    <div>
                        <label for="img-before">Link Foto Prima (TradingView)</label>
                        <input type="url" id="img-before" placeholder="https://www.tradingview.com/x/...">
                    </div>
                    <div>
                        <label for="img-after">Link Foto Dopo (TradingView)</label>
                        <input type="url" id="img-after" placeholder="https://www.tradingview.com/x/...">
                    </div>
                </div>
                <div>
                    <label for="notes">Note & Mindset</label>
                    <textarea id="notes" rows="3" placeholder="Come ti sentivi? Hai rispettato il piano?"></textarea>
                </div>

                <button type="submit" id="save-btn">Salva Operazione</button>
            </form>
        </section>

        <!-- 📊 TABELLA OPERAZIONI -->
        <section class="table-container">
            <h2>Storico Operazioni</h2>
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Asset</th>
                        <th>Tipo</th>
                        <th>SMC POI</th>
                        <th>R:R</th>
                        <th>P&L</th>
                        <th>Esito</th>
                        <th>Foto</th>
                    </tr>
                </thead>
                <tbody id="trade-list">
                    <!-- Qui verranno inseriti i trade via JavaScript -->
                </tbody>
            </table>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>\
